# luna_pinyin_simp.custom.yaml
# 朙月拼音·简化字 - LLM 候选词重排序配置
#
# 放置路径：~/Library/Rime/luna_pinyin_simp.custom.yaml
# 修改后需要重新部署 Rime（菜单栏 → 重新部署）

patch:
  engine/processors/@before 0: lua_processor@llm_context_tracker
  engine/filters/@before 1: lua_filter@llm_reranker
  llm_reranker:
    enabled: true
    endpoint: "http://localhost:8000/v1/chat/completions"
    model: "Qwen3.5-0.8B-MLX-bf16"
    max_candidates: 5
    timeout: 0.5
    min_syllables: 2
    max_rerank_pos: 2
    max_tokens: 20
    min_context_len: 6
    max_preedit_len: 10
    debug_log: false
    fallback_on_error: true
    system_prompt: "你是中文输入法候选词排序助手。根据对话历史和当前输入，从候选词列表中选出最符合语境的词。按优先级从高到低列出最多3个候选词，用顿号分隔，只输出汉字词语，不要拼音、数字序号或任何解释。"

